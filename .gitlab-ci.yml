image: node:22-bookworm-slim

stages:
    - install
    - build

variables:
    NUXT_APP_BASE_URL: "/greatbay-scie/"
    NUXT_STUDIO: "false"
    NODE_OPTIONS: "--max-old-space-size=3072"

.install-cache: &install-cache
    key:
        prefix: yarn-install
        files:
            - yarn.lock
            - package.json
    paths:
        - .yarn/cache/
        - .yarn/berry/
    policy: pull

install:
    stage: install
    cache:
        - <<: *install-cache
          policy: pull-push
    before_script:
        - corepack enable
    script:
        - yarn install --immutable

# Job name has to be `pages`. See:
# https://docs.gitlab.com/ee/user/project/pages/#how-it-works
pages:
    stage: build
    variables:
        DEBUG: "nuxt:*,vite:*"
        FF_TIMESTAMPS: "true"
        NODE_OPTIONS: >-
            --max-old-space-size=3072
            --trace-uncaught
            --trace-warnings
            --report-on-fatalerror
            --report-directory=.ci-diagnostics
    needs:
        - job: install
    cache:
        # 保留原来的 cache 配置
    before_script:
        - corepack enable
        - yarn install --immutable
    script:
        - |
            set -x
            mkdir -p .ci-diagnostics
            echo "Node: $(node --version)"
            echo "Yarn: $(yarn --version)"
            echo "CPU: $(nproc)"
            free -h || true
            df -h
            trap 'code=$?; echo "generate exit code=$code"; free -h || true; df -h; exit $code' EXIT
            yarn generate 2>&1 | tee .ci-diagnostics/generate.log
            exit ${PIPESTATUS[0]}
        - mkdir -p public
        - cp -a .output/public/. public/
    artifacts:
        when: always
        expire_in: 7 days
        paths:
            - public/
            - .ci-diagnostics/
