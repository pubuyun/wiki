image: node:22-bookworm-slim

stages:
    - install
    - build

variables:
    NUXT_APP_BASE_URL: "/greatbay-scie/"
    NUXT_STUDIO: "false"

.install-cache: &install-cache
    key:
        prefix: yarn-install
        files:
            - yarn.lock
            - package.json
    paths:
        - .yarn/cache/
        - .yarn/berry/
    policy: pull

install:
    stage: install
    cache:
        - <<: *install-cache
          policy: pull-push
    before_script:
        - corepack enable
    script:
        - yarn install --immutable

# Job name has to be `pages`. See:
# https://docs.gitlab.com/ee/user/project/pages/#how-it-works
pages:
    stage: build
    needs:
        - job: install
    cache:
        # Reuse the dependency downloads saved by the install job. This cache is
        # read-only here, so a failed build cannot replace a valid install cache.
        - <<: *install-cache
        # GitLab uploads this cache only after a successful build. The next build
        # on the same branch can therefore reuse the last successful build cache.
        - key:
              prefix: build-cache-$CI_COMMIT_REF_SLUG
              files:
                  - yarn.lock
          paths:
              - node_modules/.cache/
          policy: pull-push
          when: on_success
    before_script:
        - corepack enable
        - yarn install --immutable
    script:
        - yarn generate
        - mkdir -p public
        - cp -a .output/public/. public/
    artifacts:
        paths:
            - public/

