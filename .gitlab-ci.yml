# Job name has to be `pages`. See https://docs.gitlab.com/ee/user/project/pages/#how-it-works
image: node:22-bookworm-slim

pages:
    stage: build
    cache:
        - key:
              files:
                  - yarn.lock
                  - package.json
          paths:
              - .yarn/cache/
              - .yarn/berry/
              - node_modules/
    before_script:
        - corepack enable
        - yarn install --immutable --inline-builds
    script:
        - yarn generate
        - mkdir -p public
        - cp -a .output/public/. public/
    artifacts:
        paths:
            - public
