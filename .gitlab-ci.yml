# Job name has to be `pages`. See https://docs.gitlab.com/ee/user/project/pages/#how-it-works
pages:
    variables:
        YARN_CACHE_FOLDER: .yarn-cache
    before_script:
        - corepack enable
        - yarn install --frozen-lockfile --cache-folder .yarn-cache
    script:
        - export NUXT_APP_BASE_URL="/${CI_PROJECT_NAME}/"
        - export NUXT_STUDIO="false"
        - yarn generate
        - rm -rf public
        - mkdir public
        - cp -a .output/public/. public/
    cache:
        key:
            files:
                - yarn.lock
        paths:
            - .yarn-cache/
    artifacts:
        paths:
            - public
    rules:
        - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
          when: never
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          when: always
