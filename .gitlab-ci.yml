# Job name has to be `pages`. See https://docs.gitlab.com/ee/user/project/pages/#how-it-works
image: node:22

variables:
    NUXT_STUDIO: "false"

pages:
    stage: build
    timeout: 5m
    variables:
        RUNNER_SCRIPT_TIMEOUT: 20m
    cache:
        - key:
              files:
                  - yarn.lock
                  - package.json
          paths:
              - .yarn/cache/
              - .yarn/berry/
              - node_modules/
    before_script:
        - corepack enable
        - yarn install --immutable --inline-builds
    script:
        - export NUXT_APP_BASE_URL="/${CI_PROJECT_NAME}/"
        - yarn generate
        - rm -rf public
        - mkdir -p public
        - cp -a .output/public/. public/
    artifacts:
        paths:
            - public
    rules:
        - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
          when: never
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          when: always
