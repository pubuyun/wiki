image: node:22-bookworm-slim

stages:
    - install
    - build

variables:
    NUXT_APP_BASE_URL: "/greatbay-scie/"
    NUXT_STUDIO: "false"
    NODE_OPTIONS: "--max-old-space-size=1400"

.install-cache: &install-cache
    key:
        prefix: node-modules
        files:
            - yarn.lock
            - package.json
    paths:
        - node_modules/
    policy: pull

install:
    stage: install
    cache:
        - <<: *install-cache
          policy: pull-push
    before_script:
        - corepack enable
    script:
        - |
            if [ -x node_modules/.bin/nuxt ]; then
                echo "node_modules cache hit, skipping install"
            else
                yarn install --immutable
            fi

# Job name has to be `pages`.
pages:
    stage: build
    needs:
        - job: install
    cache:
        - <<: *install-cache
    script:
        - NUXT_STUDIO=false NUXT_APP_BASE_URL="/greatbay-scie/" ./node_modules/.bin/nuxt generate
        - mkdir -p public
        - cp -a .output/public/. public/
    artifacts:
        paths:
            - public/
