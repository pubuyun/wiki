image: node:22-bookworm-slim

stages:
    - install
    - build

variables:
    NUXT_APP_BASE_URL: "/greatbay-scie/"
    NUXT_STUDIO: "false"
    NODE_OPTIONS: "--max-old-space-size=1400"

.install-cache: &install-cache
    key:
        prefix: yarn-install
        files:
            - yarn.lock
            - package.json
    paths:
        - .yarn/cache/
        - .yarn/berry/
    policy: pull

install:
    stage: install
    cache:
        - <<: *install-cache
          policy: pull-push
    before_script:
        - corepack enable
    script:
        - yarn install --immutable

# Job name has to be `pages`.
pages:
    stage: build
    variables:
        FF_TIMESTAMPS: "true"
        NODE_OPTIONS: >-
            --max-old-space-size=1400
            --trace-uncaught
            --trace-warnings
            --report-on-fatalerror
            --report-directory=.ci-diagnostics
    needs:
        - job: install
    cache:
        - <<: *install-cache
        - key:
              prefix: build-cache-$CI_COMMIT_REF_SLUG
              files:
                  - yarn.lock
          paths:
              - node_modules/.cache/
          policy: pull-push
          when: on_success
    before_script:
        - corepack enable
        - yarn install --immutable
    script:
        - |
            mkdir -p .ci-diagnostics
            echo "Node: $(node --version)"
            echo "Yarn: $(yarn --version)"
            echo "CPU: $(nproc)"
            echo "Memory limit:"
            cat /sys/fs/cgroup/memory.max 2>/dev/null || true
            echo "Memory usage before build:"
            cat /sys/fs/cgroup/memory.current 2>/dev/null || true
            grep -E 'MemTotal|MemAvailable' /proc/meminfo || true
            df -h
            status=0
            yarn generate >.ci-diagnostics/generate.log 2>&1 || status=$?
            echo "Last 300 lines of generate.log:"
            tail -n 300 .ci-diagnostics/generate.log
            echo "Memory usage after build:"
            cat /sys/fs/cgroup/memory.current 2>/dev/null || true
            echo "Peak memory usage:"
            cat /sys/fs/cgroup/memory.peak 2>/dev/null || true
            echo "Memory events:"
            cat /sys/fs/cgroup/memory.events 2>/dev/null || true
            echo "generate exit code=$status"
            exit "$status"
        - mkdir -p public
        - cp -a .output/public/. public/
    artifacts:
        when: always
        expire_in: 7 days
        paths:
            - public/
            - .ci-diagnostics/
